<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      SEO: Title tag — shown in browser tabs and search results.
      Keep it descriptive but concise (under 60 characters).
    -->
    <title>Fashion Store — AI Try-On Demo</title>

    <!--
      SEO: Meta description.
      Describes the demo app to search engines and link previews.
    -->
    <meta
      name="description"
      content="Shop sarees, lehengas, kurtis and more. Try any outfit before you buy using AI — upload your photo and see yourself wearing it in seconds."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>" />

    <!--
      Google Fonts — loaded via HTML <link> to avoid PostCSS @import conflicts.
      preconnect establishes a connection early to speed up font loading.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

  </head>
  <body>
    <!--
      #root is where React mounts our entire app.
      React will replace the contents of this div with our components.
      It's empty here because React fills it in dynamically.
    -->
    <div id="root"></div>

    <!--
      Vite entry point — this loads our React app.
      Type="module" means it uses ES modules (modern JavaScript).
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
