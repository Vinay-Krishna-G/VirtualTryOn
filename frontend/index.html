<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      SEO: Title tag — shown in browser tabs and search results.
      Keep it descriptive but concise (under 60 characters).
    -->
    <title>VirtualFit — AI Virtual Try-On for Clothing Stores</title>

    <!--
      SEO: Meta description — shown under the title in search results.
      Should summarize what the page does in 1–2 sentences.
    -->
    <meta
      name="description"
      content="Try on sarees, lehengas, kurtis, and more virtually using AI. Upload your photo, select a garment, and see yourself wearing it instantly."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👘</text></svg>" />
  </head>
  <body>
    <!--
      #root is where React mounts our entire app.
      React will replace the contents of this div with our components.
      It's empty here because React fills it in dynamically.
    -->
    <div id="root"></div>

    <!--
      Vite entry point — this loads our React app.
      Type="module" means it uses ES modules (modern JavaScript).
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
